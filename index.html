<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>프로모터스 - 수입차 정비 전문</title>
<meta name="description" content="프로모터스는 수입차 정비예약, 지점 안내, 실제 정비사례와 공지사항을 제공하는 수입차 전문 정비센터입니다.">
<meta name="robots" content="index, follow">
<meta property="og:type" content="website">
<meta property="og:title" content="프로모터스 - 수입차 정비 전문">
<meta property="og:description" content="수입차 전문 정비센터 프로모터스. 정비예약, 지점 안내, 실제 정비사례를 확인하세요.">
<meta property="og:url" content="https://www.promotors.kr/">
<meta property="og:image" content="https://www.promotors.kr/images/logo-lockup.png">
<meta property="og:site_name" content="프로모터스">
<meta property="og:locale" content="ko_KR">
<link rel="canonical" href="https://www.promotors.kr/">

<!-- 검색엔진 소유권 확인 태그 -->
<meta name="naver-site-verification" content="7d6911db9f944373d6e8527f127f107d2d1423de">
<meta name="google-site-verification" content="SotOZtgI14Wszwoj3Bn60rEhg_DZNzoKcxFK7TlYPjU">
<!-- 빙: <meta name="msvalidate.01" content="발급코드"> -->

<!-- 지역 업체 구조화 데이터 (검색결과에 업체정보·전화 노출) -->
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "AutoRepair",
  "name": "프로모터스",
  "description": "수입차 전문 정비센터. 벤츠·BMW·아우디·포르쉐 등 수입차 정비 및 정비예약.",
  "url": "https://www.promotors.kr/",
  "logo": "https://www.promotors.kr/images/logo-lockup.png",
  "image": "https://www.promotors.kr/images/logo-lockup.png",
  "telephone": "+82-31-831-9738",
  "areaServed": "안산",
  "address": {
    "@type": "PostalAddress",
    "addressCountry": "KR",
    "addressLocality": "안산시"
  }
}
</script>
<link rel="icon" type="image/png" href="images/logo-icon.png">
<link rel="stylesheet" href="style.css">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
</head>
<body>

<main class="hero">

  <!-- 사선으로 잘린 왼쪽 시트 + 금색 테두리 배경 -->
  <div class="bg-angled" aria-hidden="true"></div>

  <!-- ===== 왼쪽 패널 (완전 고정) ===== -->
  <section class="left-panel">

    <div class="logo">
      <img src="images/logo-lockup.png" alt="프로모터스 PRO MOTORS - 수입차 정비 전문 Car Maintenance &amp; Repair">
    </div>

    <span class="yellow-bar"></span>

    <h1 class="title">정비예약</h1>

    <p class="desc">소중한 내 차량,<br>차별화된 맞춤 컨설팅을 받아보세요</p>

    <a href="#reserve" class="btn-reserve">
      <span>예약하기</span>
      <span class="arrow">›</span>
    </a>

    <div class="brands">
      <img class="bw" src="images/brands-bw.png" alt="취급 브랜드: 메르세데스-벤츠, BMW, 아우디, 폭스바겐, 페라리, 람보르기니, 마세라티, 재규어, 벤틀리, 롤스로이스, 미니, 볼보, 렉서스, 지프, 랜드로버, 포르쉐">
      <img class="color" src="images/brands-color.png" alt="" aria-hidden="true">
    </div>
  </section>

  <!-- ===== 오른쪽 패널 (내부 스크롤, 카테고리별 전환) ===== -->
  <section class="right-panel">

    <!-- 카테고리 + 로그인 (같은 줄) -->
    <div class="nav-row">
    <nav class="top-nav" aria-label="주요 메뉴">
      <ul>
        <li>
          <button class="nav-btn active" data-view="intro">프로모터스</button>
          <div class="dropdown">
            <button data-view="intro">프로모터스 소개</button>
          </div>
        </li>
        <li>
          <button class="nav-btn" data-view="location">오시는길</button>
          <div class="dropdown" id="dropdown-branches"></div>
        </li>
        <li>
          <button class="nav-btn" data-view="cases">정비사례</button>
          <div class="dropdown">
            <button data-view="cases" data-tab="tab-blog">네이버 공식블로그</button>
            <button data-view="cases" data-tab="tab-web">실제 정비사례</button>
          </div>
        </li>
        <li>
          <button class="nav-btn" data-view="notice">공지사항</button>
        </li>
        <li class="admin-only">
          <button class="nav-btn" data-view="adm-book">설정</button>
          <div class="dropdown">
            <button data-view="adm-book">예약관리</button>
            <button data-view="adm-cust">고객관리</button>
            <button data-view="adm-prod">상품관리</button>
          </div>
        </li>
      </ul>
    </nav>
    <div class="auth-bar" id="auth-bar"></div>
    </div><!-- /nav-row -->

    <!-- ① 프로모터스 소개 -->
    <div class="view active" id="view-intro">
      <header class="intro">
        <h2>프로모터스 소개</h2>
        <p class="intro-sub"><span class="line"></span>수입차 전문 정비센터<span class="line"></span></p>
      </header>

      <figure class="shop-photo no-img" id="shop-photo">
        <div class="intro-slider" id="intro-slider" aria-live="polite"></div>
        <button type="button" class="slide-nav prev" id="intro-prev" aria-label="이전 소개 이미지">‹</button>
        <button type="button" class="slide-nav next" id="intro-next" aria-label="다음 소개 이미지">›</button>
        <div class="slide-dots" id="intro-dots"></div>
        <div class="placeholder">
          <p class="ph-tel">안산점 031.831.9738</p>
          <p class="ph-note">관리자 로그인 후 소개 이미지를 최대 10장까지 등록하세요</p>
        </div>
        <button type="button" class="mini-btn photo-edit admin-only" id="btn-shop-img">소개 이미지 관리</button>
        <input type="file" id="shop-img-input" accept="image/*" multiple hidden>
      </figure>
    </div>

    <!-- ② 오시는길 -->
    <div class="view" id="view-location">
      <header class="intro">
        <h2>오시는길</h2>
        <p class="intro-sub"><span class="line"></span>프로모터스 지점 안내<span class="line"></span></p>
      </header>

      <div class="admin-tools admin-only">
        <button type="button" class="mini-btn add" id="btn-add-branch">+ 지점 추가</button>
      </div>
      <div class="location-layout">
        <div class="branches" id="branches"></div>
        <aside class="branch-preview" id="branch-preview"></aside>
      </div>
    </div>

    <!-- ③ 정비사례 -->
    <div class="view" id="view-cases">
      <header class="intro">
        <h2>정비사례</h2>
        <p class="intro-sub"><span class="line"></span>프로모터스의 작업 기록<span class="line"></span></p>
      </header>

      <div class="tabs" role="tablist">
        <button class="tab active" data-tab="tab-blog">네이버 공식블로그</button>
        <button class="tab" data-tab="tab-web">실제 정비사례</button>
      </div>

      <div class="tab-panel active" id="tab-blog">
        <p class="panel-desc">네이버 공식블로그 게시글을 연결해 홈페이지에서 함께 확인합니다.</p>
        <div class="admin-tools admin-only">
          <button type="button" class="mini-btn add" id="btn-blog-settings">블로그 연동 설정</button>
        </div>
        <div class="blog-feed" id="blog-feed"></div>
      </div>

      <div class="tab-panel" id="tab-web">
        <div class="admin-tools admin-only">
          <button type="button" class="mini-btn add" id="btn-add-case">+ 정비사례 작성</button>
        </div>
        <div class="brand-filter" id="case-brand-filter"></div>
        <div id="case-list" aria-live="polite"></div>
        <p class="hint" id="case-empty">등록된 정비사례가 없습니다.</p>
      </div>
    </div>

    <!-- ④ 공지사항 -->
    <div class="view" id="view-notice">
      <header class="intro">
        <h2>공지사항</h2>
        <p class="intro-sub"><span class="line"></span>프로모터스 소식<span class="line"></span></p>
      </header>

      <div class="admin-tools admin-only">
        <button type="button" class="mini-btn add" id="btn-add-notice">+ 공지 작성</button>
      </div>
      <div class="album" id="album"></div>
    </div>

    <!-- ⑤ 관리자: 예약관리 -->
    <div class="view" id="view-adm-book">
      <header class="intro">
        <h2>예약관리</h2>
        <p class="intro-sub"><span class="line"></span>예약 현황 · 예약완료 · 변경/취소<span class="line"></span></p>
      </header>
      <div class="adm-body" id="adm-book-body"></div>
    </div>

    <!-- ⑥ 관리자: 고객관리 -->
    <div class="view" id="view-adm-cust">
      <header class="intro">
        <h2>고객관리</h2>
        <p class="intro-sub"><span class="line"></span>메모 · 서비스 이력 · 정산<span class="line"></span></p>
      </header>
      <div class="adm-body" id="adm-cust-body"></div>
    </div>

    <!-- ⑦ 관리자: 상품관리 -->
    <div class="view" id="view-adm-prod">
      <header class="intro">
        <h2>상품관리</h2>
        <p class="intro-sub"><span class="line"></span>예약 시 선택 가능한 서비스<span class="line"></span></p>
      </header>
      <div class="admin-tools">
        <button type="button" class="mini-btn add" id="btn-add-product">+ 상품 추가</button>
      </div>
      <div class="adm-body" id="adm-prod-body"></div>
    </div>

  </section>

</main>

<!-- 모달 (로그인/회원가입/관리자/글 편집 공용) -->
<div class="modal-backdrop" id="modal" hidden>
  <div class="modal-card" id="modal-card" role="dialog" aria-modal="true"></div>
</div>

<script src="app.js"></script>
</body>
</html>
